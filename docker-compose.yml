services:
   questionsapp:
     build:
       context: .
       dockerfile: Dockerfile
       target: dev
       args:
         https_proxy: ${HTTPS_PROXY}
         http_proxy: ${HTTP_PROXY}
         HTTPS_PROXY: ${HTTPS_PROXY}
         HTTP_PROXY: ${HTTP_PROXY}
     container_name: questionsapp
     environment:
       CELERY_BROKER_URL: redis://${REDIS_HOST}:${REDIS_PORT}/${REDIS_DB}
       CELERY_RESULT_BACKEND: redis://${REDIS_HOST}:${REDIS_PORT}/${REDIS_DB}
       PYTHONUNBUFFERED: "1"
     volumes:
       - ${APP_DIR_HOST:?err}:${APP_DIR_CONTR:?err}
       - ${LOGS_DIR_HOST:?err}:${LOGS_DIR_CONTR:?err}
       - ${ATTACH_DIR_HOST:?err}:${ATTACH_DIR_CONTR:?err}
       - ${DATA_DIR_HOST:?err}:${DATA_DIR_CONTR:?err}
       - uv_cache:/root/.cache/uv
     expose:
       - 8002
     ports:
       - 8002:8002
     env_file:
       - .env
     restart: always
     healthcheck:
       test: ["CMD-SHELL", "python -c \"import socket; s=socket.socket(); s.connect(('127.0.0.1', 8002)); s.close()\""]
       interval: 30s
       timeout: 10s
       retries: 3
       start_period: 20s
     networks:
       - default
       - service-network
     depends_on:
       - questionsapp_celery
     command: uvicorn app.main:app --host 0.0.0.0 --port 8002

   questionsapp_celery:
     build:
       context: .
       dockerfile: Dockerfile
       target: dev
       args:
         https_proxy: ${HTTPS_PROXY}
         http_proxy: ${HTTP_PROXY}
         HTTPS_PROXY: ${HTTPS_PROXY}
         HTTP_PROXY: ${HTTP_PROXY}
     container_name: questionsapp_celery
     environment:
       CELERY_BROKER_URL: redis://${REDIS_HOST}:${REDIS_PORT}/${REDIS_DB}
       CELERY_RESULT_BACKEND: redis://${REDIS_HOST}:${REDIS_PORT}/${REDIS_DB}
       PYTHONUNBUFFERED: "1"
     volumes:
       - ${APP_DIR_HOST:?err}:${APP_DIR_CONTR:?err}
       - ${LOGS_DIR_HOST:?err}:${LOGS_DIR_CONTR:?err}
       - ${ATTACH_DIR_HOST:?err}:${ATTACH_DIR_CONTR:?err}
       - ${DATA_DIR_HOST:?err}:${DATA_DIR_CONTR:?err}
       - uv_cache:/root/.cache/uv
     restart: always
     env_file:
       - .env
     networks:
       - default
       - service-network
     command: celery --app=app.workers.celery_worker.celery worker --loglevel=DEBUG

   questionscron:
     build:
       context: .
       dockerfile: Dockerfile
       target: cron
       args:
         https_proxy: ${HTTPS_PROXY}
         http_proxy: ${HTTP_PROXY}
         HTTPS_PROXY: ${HTTPS_PROXY}
         HTTP_PROXY: ${HTTP_PROXY}
     container_name: questionscron
     volumes:
       - ${APP_DIR_HOST:?err}:${APP_DIR_CONTR:?err}
       - ${LOGS_DIR_HOST:?err}:${LOGS_DIR_CONTR:?err}
       - ${ATTACH_DIR_HOST:?err}:${ATTACH_DIR_CONTR:?err}
       - ${DATA_DIR_HOST:?err}:${DATA_DIR_CONTR:?err}
       - questionsapp_venv:/usr/src/questionsapp/.venv
       - uv_cache:/root/.cache/uv
     restart: always
     env_file:
       - .env
     networks:
       - default
       - service-network

volumes:
  uv_cache:

networks:
  default:
    driver: bridge

  service-network:
    name: service-network
    external: true
